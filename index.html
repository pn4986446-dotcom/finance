<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Govind Finance Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
scroll-behavior:smooth;
}

:root{

--bg:#07121f;
--card:#102033;
--primary:#00d4ff;
--secondary:#00ffae;
--text:#ffffff;
--muted:#cbd5e1;

}

body{

background:linear-gradient(135deg,#07121f,#102c4c,#07121f);
color:var(--text);

}

header{

position:sticky;
top:0;
z-index:1000;

background:rgba(10,20,35,.9);

backdrop-filter:blur(12px);

padding:18px 40px;

display:flex;

justify-content:space-between;

align-items:center;

box-shadow:0 8px 20px rgba(0,0,0,.3);

}

.logo{

font-size:30px;

font-weight:700;

color:var(--secondary);

}

nav{

display:flex;

gap:20px;

}

nav a{

text-decoration:none;

color:white;

font-weight:600;

transition:.3s;

}

nav a:hover{

color:var(--primary);

}

.hero{

padding:100px 30px;

text-align:center;

}

.hero h1{

font-size:55px;

margin-bottom:15px;

background:linear-gradient(90deg,#00d4ff,#00ffae);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

}

.hero p{

font-size:20px;

max-width:800px;

margin:auto;

color:#d1d5db;

}

.btn{

margin-top:30px;

padding:15px 35px;

background:linear-gradient(90deg,#00d4ff,#00ffae);

border:none;

border-radius:12px;

font-size:18px;

font-weight:bold;

cursor:pointer;

transition:.3s;

}

.btn:hover{

transform:translateY(-4px);

box-shadow:0 12px 30px rgba(0,212,255,.4);

}

.container{

width:95%;

max-width:1200px;

margin:auto;

padding:40px 0;

}

.card{

background:rgba(255,255,255,.06);

backdrop-filter:blur(15px);

border-radius:18px;

padding:25px;

margin-bottom:30px;

box-shadow:0 10px 35px rgba(0,0,0,.35);

transition:.3s;

}

.card:hover{

transform:translateY(-8px);

}

.card h2{

margin-bottom:20px;

color:#00d4ff;

}

input{

width:100%;

padding:15px;

margin-top:10px;

margin-bottom:15px;

border:none;

border-radius:10px;

background:#1e293b;

color:white;

font-size:16px;

}

button{

padding:14px 25px;

border:none;

border-radius:10px;

background:linear-gradient(90deg,#00d4ff,#00ffae);

font-weight:bold;

cursor:pointer;

}

button:hover{

opacity:.9;

}

.result{

margin-top:20px;

font-size:22px;

font-weight:bold;

color:#00ffae;

}

.grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(350px,1fr));

gap:25px;

}

.tip{

padding:15px;

background:#0f172a;

border-left:5px solid #00ffae;

border-radius:10px;

margin:15px 0;

}

footer{

margin-top:60px;

padding:40px;

text-align:center;

background:#08111d;

}

footer a{

color:#00d4ff;

display:block;

margin-top:10px;

text-decoration:none;

}

.theme{

position:fixed;

right:20px;

bottom:20px;

width:60px;

height:60px;

border-radius:50%;

font-size:24px;

}

</style>

</head>

<body>

<header>

<div class="logo">
💰 Govind Finance Hub
</div>

<nav>

<a href="#calculator">Calculator</a>

<a href="#saving">Savings</a>

<a href="#tips">Tips</a>

<a href="#game">Game</a>

<a href="#contact">Contact</a>

</nav>

</header>

<section class="hero">

<h1>Smart Finance Starts Here</h1>

<p>

Welcome to Govind Finance Hub.

Calculate, save, budget and grow your money using beautiful financial tools.

</p>

<button class="btn">

Explore Now 🚀

</button>

</section>

<div class="container">

<div class="grid">

<div class="card" id="calculator">

<h2>🧮 Calculator</h2>

<input type="number" id="num1" placeholder="Enter first number">

<input type="number" id="num2" placeholder="Enter second number">

<button onclick="calculate('+')">Add</button>

<button onclick="calculate('-')">Subtract</button>

<button onclick="calculate('*')">Multiply</button>

<button onclick="calculate('/')">Divide</button>

<div class="result" id="answer">

Result :

</div>

</div>

<div class="card" id="saving">

<h2>💰 Savings Calculator</h2>

<input type="number" id="income" placeholder="Monthly Income">

<input type="number" id="expense" placeholder="Monthly Expense">

<button onclick="saving()">

Calculate Savings

</button>

<div class="result" id="savingResult">

Savings :

</div>

</div>

</div>
